        function convertPrice(priceInUSD, targetCurrency) {
            if (!exchangeRates || targetCurrency === 'USD') {
                return priceInUSD;
            }
            
            const rate = exchangeRates.rates[targetCurrency];
            if (rate) {
                return priceInUSD * rate;
            }
            
            return priceInUSD; // Fallback
        }
        
        function formatCurrency(amount, currency) {
            const convertedAmount = convertPrice(amount, currency);
            
            const currencySymbols = {
                'USD': '$',
                'EUR': '€',
                'GBP': '£',
                'JPY': '¥',
                'AUD': 'A$',
                'CAD': 'C$',
                'CHF': 'CHF ',
                'CNY': '¥',
                'INR': '₹',
                'NZD': 'NZ$'
            };
            
            const symbol = currencySymbols[currency] || '$';
            
            // Format based on currency
            if (currency === 'JPY' || currency === 'CNY') {
                return `${symbol}${Math.round(convertedAmount).toLocaleString()}`;
            } else {
                return `${symbol}${convertedAmount.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
            }
        }

            try {

                    body: JSON.stringify({

                    throw new Error('API not available');
                }
            } catch (error) {
                console.log('API not available, using demo mode');
                return calculateDemoSafety();
            }
        }
        
        function calculateDemoSafety() {
            if (dives.length === 0 || !flightTime) {
                return { is_safe: false, details: 'No dives or flight time provided' };
            }
            
            const lastDive = new Date(dives[dives.length - 1].dive_datetime);
            const flightTimeDate = new Date(flightTime);
            const hoursSinceLastDive = (flightTimeDate - lastDive) / (1000 * 60 * 60);
            
            const maxDepth = Math.max(...dives.map(d => d.max_depth));
            const requiredHours = maxDepth > 30 ? 24 : 18;
            
            const isSafe = hoursSinceLastDive >= requiredHours;
            const recommendedWait = isSafe ? 0 : Math.ceil(requiredHours - hoursSinceLastDive);
            
            return {
                is_safe: isSafe,
                recommended_wait_time: recommendedWait,
                details: isSafe 
                    ? `Safe for flight. Surface interval: ${hoursSinceLastDive.toFixed(1)}h (required: ${requiredHours}h)`
                    : `Not safe for flight. Surface interval: ${hoursSinceLastDive.toFixed(1)}h (required: ${requiredHours}h)`
            };
        }

        async function saveTrip(tripData) {
            try {
                const response = await fetch(`${API_URL}/api/trips/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(tripData)
                });
                
                if (response.ok) {
                    const savedTrip = await response.json();
                    savedTrips.push(savedTrip);
                    saveTripsToStorage(); // Save to localStorage
                    return savedTrip;
                } else {
                    // Fallback to localStorage if backend fails
                    const localTrip = {
                        ...tripData,
                        id: Date.now().toString(),
                        created_at: new Date().toISOString()
                    };
                    savedTrips.push(localTrip);
                    saveTripsToStorage();
                    return localTrip;

                const localTrip = {

                    id: Date.now().toString(),
                    created_at: new Date().toISOString()

                saveTripsToStorage();
                return localTrip;
            }
        }

        function updateTripDates() {
            const startDate = document.getElementById('tripStartDate').value;
            const endDate = document.getElementById('tripEndDate').value;
            
            if (startDate && endDate) {
                const start = new Date(startDate);
                const end = new Date(endDate);
                const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                
                if (days > 0) {
                    document.getElementById('tripDuration').value = days;
                    console.log('📅 Trip duration calculated:', days, 'days');
                }
            }
        }
        
        function calculateTripPricing() {
            const destination = document.getElementById('tripDestination').value;
            const duration = parseInt(document.getElementById('tripDuration').value) || 7;
            const divingDays = parseInt(document.getElementById('tripDivingDays').value) || 5;
            
            if (!destination) {
                alert('Please select a destination first');
                return;
            }
            
            // Base costs by destination (per day)
            const baseCosts = {
                'Belize': 200,
                'Red Sea': 180,
                'Great Barrier Reef': 250,
                'Maldives': 300,
                'Caribbean': 220,
                'Indonesia': 150,
                'Philippines': 120,
                'Fiji': 160,
                'Galapagos': 350
            };
            
            const baseCost = baseCosts[destination] || 200;
            const totalCost = (baseCost * duration) + (baseCost * divingDays * 0.8);
            
            const pricing = {
                destination: destination,
                duration: duration,
                divingDays: divingDays,
                average_price: Math.round(totalCost),
                budget_price: Math.round(totalCost * 0.7),
                luxury_price: Math.round(totalCost * 1.5),
                price_per_day: Math.round(totalCost / duration),
                components: {
                    accommodation: {
                        percentage: 35,
                        estimated_cost: Math.round(totalCost * 0.35)
                    },
                    diving: {
                        percentage: 25,
                        estimated_cost: Math.round(totalCost * 0.25)
                    },
                    meals: {
                        percentage: 20,

        function saveCurrentTrip() {
            console.log('💾 Saving trip...');
            console.log('Dives:', dives.length);
            
            // Get trip details from the form
            const tripName = document.getElementById('tripName')?.value || `Trip ${new Date().toLocaleDateString()}`;
            const tripDescription = document.getElementById('tripDescription')?.value || `Dive trip with ${dives.length} dives`;
            const destination = document.getElementById('tripDestination')?.value || 'Unknown';
            const startDate = document.getElementById('tripStartDate')?.value;
            const endDate = document.getElementById('tripEndDate')?.value;
            const duration = parseInt(document.getElementById('tripDuration')?.value) || 7;
            const divingDays = parseInt(document.getElementById('tripDivingDays')?.value) || dives.length;
            
            if (!destination) {
                alert('Please select a destination');
                return;
            }
            
            if (dives.length === 0) {
                alert('Please add dives before saving');
                return;
            }
            
            console.log('Trip name:', tripName);
            console.log('Destination:', destination);
            console.log('Duration:', duration);
            console.log('Diving days:', divingDays);
            
            // Calculate pricing based on destination and trip details
            const baseCosts = {
                'Belize': 200,
                'Red Sea': 180,
                'Great Barrier Reef': 250,
                'Maldives': 300,
                'Caribbean': 220,
                'Indonesia': 150,
                'Philippines': 120,
                'Fiji': 160,
                'Galapagos': 350
            };
            
            const baseCost = baseCosts[destination] || 200;
            const totalCost = (baseCost * duration) + (baseCost * divingDays * 0.8);
            
            const tripData = {
                name: tripName,
                description: tripDescription,
                destination: destination,
                start_date: startDate || new Date().toISOString().split('T')[0],
                end_date: endDate || new Date().toISOString().split('T')[0],
                duration: duration,
                divingDays: divingDays,
                dives: dives,
                created_at: new Date().toISOString(),
                // Add comprehensive pricing information
                pricing: {
                    destination: destination,
                    duration: duration,
                    divingDays: divingDays,
                    average_price: Math.round(totalCost),
                    budget_price: Math.round(totalCost * 0.7),
                    luxury_price: Math.round(totalCost * 1.5),
                    price_per_day: Math.round(totalCost / duration),
                    components: {
                        accommodation: {
                            percentage: 35,
                            estimated_cost: Math.round(totalCost * 0.35)
                        },
                        diving: {
                            percentage: 25,
                            estimated_cost: Math.round(totalCost * 0.25)
                        },
                        meals: {
                            percentage: 20,
                            estimated_cost: Math.round(totalCost * 0.20)
                        },
                        transportation: {
                            percentage: 15,
                            estimated_cost: Math.round(totalCost * 0.15)
                        },
                        equipment: {
                            percentage: 5,
                            estimated_cost: Math.round(totalCost * 0.05)
                        }
                    }
                },
                total_cost_estimate: Math.round(totalCost)
            };
            
            // Save trip using the enhanced saveTrip function
            saveTrip(tripData).then(savedTrip => {
                console.log('✅ Trip saved successfully:', savedTrip);
                alert('Trip saved successfully!');
                
                // Clear current trip state
                currentTripName = '';

                navigate('my-trips');
            }).catch(error => {
                console.error('❌ Error saving trip:', error);
                alert('Error saving trip: ' + error.message);
            });
        }

                            </div>
                        </div>
                    </nav>
                    
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div class="flex justify-between items-center mb-8">
                            <h1 class="text-3xl font-bold text-gray-900">My Trips</h1>
                            <button onclick="navigate('planner')" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-semibold">

                            </button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${savedTrips.length === 0 ? '<p class="text-gray-500 col-span-full text-center py-8">No trips saved yet. Plan your first trip!</p>' : savedTrips.map(trip => `
                                <div class="bg-white rounded-xl shadow-lg p-6">
                                    <h3 class="text-xl font-semibold mb-2">${trip.name}</h3>
                                    <p class="text-gray-600 mb-4">${trip.description}</p>
                                    <div class="space-y-2 text-sm">
                                        <p><i class="fas fa-map-marker-alt mr-2"></i>${trip.destination || 'Unknown'}</p>
                                        <p><i class="fas fa-calendar mr-2"></i>${new Date(trip.created_at).toLocaleDateString()}</p>
                                        <p><i class="fas fa-dollar-sign mr-2"></i>$${trip.total_cost_estimate || 1500}</p>
                                        ${trip.pricing ? `<p><i class="fas fa-chart-pie mr-2"></i>${trip.pricing.components?.accommodation?.percentage || 0}% Accommodation</p>` : ''}
                                    </div>
                                    ${trip.pricing ? `
                                        <div class="mt-4 p-3 bg-gray-50 rounded-lg">
                                            <h4 class="font-semibold text-sm mb-2">Cost Breakdown</h4>
                                            <div class="space-y-1 text-xs">
                                                ${trip.pricing.components ? Object.entries(trip.pricing.components).map(([component, data]) => `
                                                    <div class="flex justify-between">
                                                        <span>${component.charAt(0).toUpperCase() + component.slice(1)}</span>
                                                        <span class="font-semibold">$${data.estimated_cost}</span>
                                                    </div>

                                            </div>
                                        </div>
                                    ` : ''}
                                    <div class="mt-4 flex space-x-2">
                                        <button onclick="editTrip(${trip.id})" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                                            <i class="fas fa-edit mr-1"></i>Edit
                                        </button>
                                        <button onclick="deleteTrip(${trip.id})" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition">
                                            <i class="fas fa-trash mr-1"></i>Delete
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderProfilePage() {
            // Ensure user data is properly initialized
            const userData = {
                full_name: currentUser?.full_name || '',
                username: currentUser?.username || '',
                email: currentUser?.email || '',
                certification_level: currentUser?.certification_level || 'Open Water'
            };
            
            return `
                <div class="min-h-screen bg-gray-50">
                    <nav class="bg-white shadow-lg">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex justify-between h-16">
                                <div class="flex items-center">
                                    <i class="fas fa-water text-blue-600 text-2xl mr-3"></i>
                                    <span class="font-bold text-xl">DecoRoute</span>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <button onclick="navigate('dashboard')" class="text-gray-600 hover:text-gray-900">Dashboard</button>
                                    <button onclick="navigate('planner')" class="text-gray-600 hover:text-gray-900">Plan Trip</button>
                                    <button onclick="navigate('my-trips')" class="text-gray-600 hover:text-gray-900">My Trips</button>
                                    <button onclick="logout()" class="text-red-600 hover:text-red-900">Logout</button>
                                </div>
                            </div>
                        </div>
                    </nav>
                    
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div class="max-w-2xl mx-auto">
                            <h1 class="text-3xl font-bold text-gray-900 mb-8">Profile</h1>
                            
                            <div class="bg-white rounded-xl shadow-lg p-6">
                                <h2 class="text-xl font-semibold mb-6">Profile Information</h2>
                                <form id="profileForm" class="space-y-6">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                                            <input type="text" value="${userData.full_name}" name="full_name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                                            <input type="text" value="${userData.username}" name="username" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                            <input type="email" value="${userData.email}" name="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        </div>
                                        
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Certification Level</label>
                                            <select name="certification_level" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                                <option value="Open Water" ${userData.certification_level === 'Open Water' ? 'selected' : ''}>Open Water</option>
                                                <option value="Advanced Open Water" ${userData.certification_level === 'Advanced Open Water' ? 'selected' : ''}>Advanced Open Water</option>
                                                <option value="Rescue Diver" ${userData.certification_level === 'Rescue Diver' ? 'selected' : ''}>Rescue Diver</option>
                                                <option value="Divemaster" ${userData.certification_level === 'Divemaster' ? 'selected' : ''}>Divemaster</option>
                                                <option value="Instructor" ${userData.certification_level === 'Instructor' ? 'selected' : ''}>Instructor</option>
                                            </select>
                                        </div>
                                        
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Preferred Currency</label>
                                            <select id="profileCurrency" name="currency" onchange="updateUserCurrency(this.value)" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                                <option value="USD" ${userCurrency === 'USD' ? 'selected' : ''}>USD - US Dollar ($)</option>
                                                <option value="EUR" ${userCurrency === 'EUR' ? 'selected' : ''}>EUR - Euro (€)</option>
                                                <option value="GBP" ${userCurrency === 'GBP' ? 'selected' : ''}>GBP - British Pound (£)</option>
                                                <option value="JPY" ${userCurrency === 'JPY' ? 'selected' : ''}>JPY - Japanese Yen (¥)</option>
                                                <option value="AUD" ${userCurrency === 'AUD' ? 'selected' : ''}>AUD - Australian Dollar (A$)</option>
                                                <option value="CAD" ${userCurrency === 'CAD' ? 'selected' : ''}>CAD - Canadian Dollar (C$)</option>
                                                <option value="CHF" ${userCurrency === 'CHF' ? 'selected' : ''}>CHF - Swiss Franc (CHF)</option>

                                    <div class="flex space-x-4">

                                        </button>
                                        <button type="button" onclick="navigate('dashboard')" class="flex-1 bg-gray-300 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-400 transition font-semibold">

                            </div>

                    </div>
                </div>

        }
        
        // Event Handlers
        function attachEventListeners() {
            // Register Form
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(registerForm);
                    const userData = Object.fromEntries(formData.entries());
                    
                    // Basic validation
                    if (!userData.email || !userData.email.includes('@')) {
                        const errorDiv = document.getElementById('registerError');
                        if (errorDiv) {
                            errorDiv.textContent = 'Please enter a valid email address';
                            errorDiv.classList.remove('hidden');
                        }
                        return false; // Prevent form submission
                    }
                    
                    if (userData.password.length < 6) {
                        const errorDiv = document.getElementById('registerError');
                        if (errorDiv) {
                            errorDiv.textContent = 'Password must be at least 6 characters';
                            errorDiv.classList.remove('hidden');
                        }
                        return false; // Prevent form submission
                    }
                    
                    if (!userData.username || userData.username.length < 3) {
                        const errorDiv = document.getElementById('registerError');
                        if (errorDiv) {
                            errorDiv.textContent = 'Username must be at least 3 characters';
                            errorDiv.classList.remove('hidden');
                        }
                        return false; // Prevent form submission
                    }
                    
                    try {
                        const result = await registerUser(userData);
                        currentUser = result;
                        navigate('dashboard');
                    } catch (error) {
                        const errorDiv = document.getElementById('registerError');
                        if (errorDiv) {
                            errorDiv.textContent = error.message;
                            errorDiv.classList.remove('hidden');
                        }
                    }
                    return false;
                });
            }
            
            // Login Form
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(loginForm);
                    const credentials = Object.fromEntries(formData.entries());
                    
                    try {
                        const result = await loginUser(credentials);
                        currentUser = result;
                        navigate('dashboard');
                    } catch (error) {
                        const errorDiv = document.getElementById('loginError');
                        if (errorDiv) {
                            errorDiv.textContent = error.message;
                            errorDiv.classList.remove('hidden');
                        }
                    }
                });
            }
            
            // Profile Form
            const profileForm = document.getElementById('profileForm');
            if (profileForm) {
                profileForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    // Get form data
                    const formData = new FormData(profileForm);
                    const profileData = Object.fromEntries(formData.entries());
                    
                    // Update current user object
                    currentUser.full_name = profileData.full_name;
                    currentUser.username = profileData.username;
                    currentUser.email = profileData.email;
                    currentUser.certification_level = profileData.certification_level;
                    
                    // Show success message
                    alert('Profile updated successfully!');
                    
                    // Navigate back to dashboard
                    navigate('dashboard');
                });
            }
        }
        
        async function performSafetyCheck() {
            console.log('🔍 Safety check called');
            console.log('Dives:', dives.length);
            console.log('Flight time:', flightTime);
            console.log('Loading:', isLoading);
            
            if (dives.length === 0) {
                console.log('❌ No dives added');
                displaySafetyResults({ error: 'Please add at least one dive before checking safety' });
                return;
            }
            
            if (!flightTime) {
                console.log('❌ No flight time set');
                displaySafetyResults({ error: 'Please set flight time before checking safety' });
                return;
            }
            
            if (isLoading) {
                console.log('❌ Already loading - resetting state');
                isLoading = false;
            }
            
            isLoading = true;
            renderApp();
            
            try {
                console.log('🚀 Starting safety check...');
                const result = await checkTransitSafety();
                console.log('✅ Safety check result:', result);
                displaySafetyResults(result);
            } catch (error) {
                console.log('❌ Safety check error:', error);
                displaySafetyResults({ error: error.message });
            } finally {
                isLoading = false;
                console.log('🔄 Loading state reset to false');
                renderApp();
            }
        }
        
        // Make sure this function is globally accessible
        window.performSafetyCheck = performSafetyCheck;
        
        function displaySafetyResults(result) {
            const resultsDiv = document.getElementById('safetyResults');
            if (!resultsDiv) return;
            
            if (result.error) {
                resultsDiv.innerHTML = `
                    <div class="text-center p-4">
                        <i class="fas fa-exclamation-circle text-red-600 text-3xl mb-3"></i>
                        <h4 class="font-semibold text-red-600 mb-2">❌ Error</h4>
                        <p class="text-gray-700">${result.error}</p>
                    </div>
                `;
            } else {
                const isSafe = result.is_safe;
                const glowClass = isSafe ? 'safety-glow' : 'danger-glow';
                resultsDiv.innerHTML = `
                    <div class="text-center ${glowClass} p-4 rounded-lg">
                        <div class="text-4xl mb-4">
                            ${isSafe ? '<i class="fas fa-check-circle text-green-600"></i>' : '<i class="fas fa-exclamation-triangle text-red-600"></i>'}
                        </div>
                        <h4 class="font-bold text-xl mb-2 ${isSafe ? 'text-green-600' : 'text-red-600'}">
                            ${isSafe ? '✅ Safe for Flight' : '⚠️ Not Safe for Flight'}
                        </h4>
                        <p class="text-gray-700">${result.details || 'No results'}</p>
                        ${result.recommended_wait_time ? `<p class="text-sm text-blue-600 font-semibold mt-2">Recommended wait: ${result.recommended_wait_time} hours</p>` : ''}
                    </div>
                `;
            }
        }
        
        // Initialize Application
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Application starting...');
            
            // Load saved trips from localStorage first
            loadSavedTrips();
            
            // Initialize currency system with fallback
            initializeCurrency().then(() => {
                console.log('💱 Currency system initialized');
                console.log('🌍 User currency:', userCurrency);
                renderApp();
            }).catch(error => {
                console.error('❌ Currency initialization failed:', error);
                // Still render the app even if currency fails
                renderApp();
            });
        });
    </script>
</body>
