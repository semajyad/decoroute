<!DOCTYPE html>
<html>
<head>
    <title>Minimal Pricing Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Minimal Pricing Test</h1>
        
        <div class="bg-white p-4 rounded shadow">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Destination</label>
                    <select id="location" class="w-full px-3 py-2 border rounded">
                        <option value="">Select...</option>
                        <option value="Belize">Belize</option>
                        <option value="Red Sea">Red Sea</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Duration (days)</label>
                    <input type="number" id="duration" min="1" max="30" value="7" class="w-full px-3 py-2 border rounded">
                </div>
            </div>
            
            <button onclick="testPricing()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Search Pricing
            </button>
            
            <div id="results" class="mt-4"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8001';
        
        async function testPricing() {
            const location = document.getElementById('location').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            if (!location) {
                alert('Please select a destination');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p class="text-gray-600">Searching...</p>';
            
            try {
                console.log('🔍 Testing pricing for:', location, duration);
                
                const response = await fetch(`${API_URL}/api/search/pricing/breakdown`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location, duration_days: duration })
                });
                
                console.log('📡 Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('📦 Received data:', data);
                    displayResults(data);
                } else {
                    throw new Error('Failed to fetch pricing');
                }
            } catch (error) {
                console.error('❌ Error:', error);
                resultsDiv.innerHTML = `<p class="text-red-600">Error: ${error.message}</p>`;
            }
        }
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const pricing = data.pricing;
            
            let html = `
                <div class="bg-green-50 p-4 rounded">
                    <h3 class="font-semibold text-green-800">Pricing for ${data.location}</h3>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <div>Average: $${pricing.average_price}</div>
                        <div>Budget: $${pricing.budget_price}</div>
                        <div>Luxury: $${pricing.luxury_price}</div>
                        <div>Per Day: $${pricing.price_per_day}</div>
                    </div>
            `;
            
            if (pricing.components) {
                html += '<h4 class="font-semibold mt-4">Cost Breakdown:</h4>';
                for (const [component, info] of Object.entries(pricing.components)) {
                    html += `
                        <div class="flex justify-between items-center py-1">
                            <span>${component}</span>
                            <span>${info.percentage}% - $${info.estimated_cost}</span>
                        </div>
                    `;
                }
            }
            
            html += '</div>';
            resultsDiv.innerHTML = html;
        }
        
        // Test localStorage
        console.log('💾 Testing localStorage...');
        try {
            localStorage.setItem('test', 'working');
            console.log('✅ LocalStorage working');
        } catch (e) {
            console.error('❌ LocalStorage failed:', e);
        }
    </script>
</body>
</html>
