<!DOCTYPE html>
<html>
<head>
    <title>Minimal Pricing Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Minimal Pricing Test</h1>
        
        <div class="bg-white p-4 rounded shadow">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Destination</label>
                    <select id="location" class="w-full px-3 py-2 border rounded">
                        <option value="">Select...</option>
                        <option value="Belize">Belize</option>
                        <option value="Red Sea">Red Sea</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Duration (days)</label>
                    <input type="number" id="duration" min="1" max="30" value="7" class="w-full px-3 py-2 border rounded">
                </div>
            </div>
            
            <button onclick="testPricing()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Search Pricing
            </button>
            
            <div id="results" class="mt-4"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8001';
        
        console.log('🚀 Minimal test page loaded');
        
        async function testPricing() {
            console.log('🔍 testPricing() called');
            
            const location = document.getElementById('location').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            console.log('📍 Location:', location);
            console.log('⏱️ Duration:', duration);
            
            if (!location) {
                alert('Please select a destination');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p class="text-gray-600">Searching...</p>';
            
            try {
                console.log('� Making API call to:', `${API_URL}/api/search/pricing/breakdown`);
                
                const response = await fetch(`${API_URL}/api/search/pricing/breakdown`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location, duration_days: duration })
                });
                
                console.log('📡 Response status:', response.status);
                console.log('📡 Response headers:', Object.fromEntries(response.headers.entries()));
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('📦 Received data:', data);
                    console.log('📦 Data type:', typeof data);
                    console.log('📦 Data keys:', Object.keys(data));
                    console.log('📦 Pricing data:', data.pricing);
                    console.log('📦 Components:', data.pricing?.components);
                    
                    displayResults(data);
                } else {
                    const errorText = await response.text();
                    console.error('❌ API Error:', response.status, errorText);
                    resultsDiv.innerHTML = `<p class="text-red-600">API Error: ${response.status} - ${errorText}</p>`;
                }
            } catch (error) {
                console.error('❌ Network Error:', error);
                resultsDiv.innerHTML = `<p class="text-red-600">Network Error: ${error.message}</p>`;
            }
        }
        
        function displayResults(data) {
            console.log('🎨 displayResults() called with:', data);
            
            const resultsDiv = document.getElementById('results');
            
            if (!data || !data.pricing) {
                console.error('❌ Invalid data structure');
                resultsDiv.innerHTML = '<p class="text-red-600">Invalid data received</p>';
                return;
            }
            
            const pricing = data.pricing;
            console.log('💰 Pricing object:', pricing);
            
            let html = '<div class="bg-green-50 p-4 rounded">';
            html += '<h3 class="font-semibold text-green-800">Pricing for ' + data.location + '</h3>';
            
            // Basic pricing
            html += '<div class="grid grid-cols-2 gap-4 mt-2">';
            html += '<div>Average: $' + pricing.average_price + '</div>';
            html += '<div>Budget: $' + pricing.budget_price + '</div>';
            html += '<div>Luxury: $' + pricing.luxury_price + '</div>';
            html += '<div>Per Day: $' + pricing.price_per_day + '</div>';
            html += '</div>';
            
            // Components
            if (pricing.components) {
                console.log('🏗️ Adding components breakdown...');
                html += '<h4 class="font-semibold mt-4">Cost Breakdown:</h4>';
                
                const componentEntries = Object.entries(pricing.components);
                console.log('📦 Component entries:', componentEntries);
                
                componentEntries.forEach(([component, info]) => {
                    console.log('📦 Processing component:', component, info);
                    html += '<div class="flex justify-between items-center py-1 border-b">';
                    html += '<span>' + component + '</span>';
                    html += '<span>' + info.percentage + '% - $' + info.estimated_cost + '</span>';
                    html += '</div>';
                });
            } else {
                console.log('❌ No components found');
                html += '<p class="text-yellow-600">No components available</p>';
            }
            
            html += '</div>';
            
            console.log('🎨 Setting HTML...');
            resultsDiv.innerHTML = html;
            console.log('✅ displayResults completed');
        }
        
        // Test localStorage
        console.log('💾 Testing localStorage...');
        try {
            localStorage.setItem('test', 'working');
            const stored = localStorage.getItem('test');
            console.log('✅ LocalStorage working:', stored);
        } catch (e) {
            console.error('❌ LocalStorage failed:', e);
        }
    </script>
</body>
</html>
