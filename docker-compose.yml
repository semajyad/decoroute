version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: decoroute
      POSTGRES_USER: decoroute_user
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decoroute_user -d decoroute"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
